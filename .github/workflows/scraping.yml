name: Ejecutar Automatización de Scraping

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scraping_job:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: 📥 Descargar mi código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🛠️ Instalar Dependencias
      run: |
        pip install scrapy playwright
        playwright install chromium --with-deps

    - name: 🕸️ Ejecutar Arañas de Scrapy
      # Usamos runspider para ejecutar archivos .py individuales sin crear un proyecto complejo
      # El flag -o guarda la salida en un archivo automáticamente
      run: |
        python -m scrapy runspider Scrapy/spider_libros.py -o archivos_extraidos/datos_scrapy.json

    - name: 🚀 Ejecutar Scripts de Playwright (Opcional)
      # Mantenemos esto por si quieres seguir usando tus otros bots
      run: |
        python PlayWright/extractor_imagenes.py || echo "No se encontró el script de imágenes"

    - name: 📤 Subir Resultados al Repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Agregamos JSONs, CSVs e Imágenes
        git add archivos_extraidos/*.json archivos_extraidos/*.jpg archivos_extraidos/*.csv
        
        git commit -m "feat: actualización de datos automática [skip ci]" || echo "Sin cambios"
        git push

